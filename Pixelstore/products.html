<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PixelStore Products</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="cartNotification" class="cart-notification">
    Product Added To Cart 🛒
</div>

<header>

    <nav class="navbar">

        <div class="logo">
            PixelStore
        </div>

        <ul class="nav-links">

            <li><a href="index.html">Home</a></li>

            <li><a href="products.html">Products</a></li>

        </ul>

        <div class="icons">

            <div class="cart-icon">

                <i class="fa-solid fa-cart-shopping"></i>

                <span id="cartCount">0</span>

            </div>

        </div>
<div id="serverStatus"></div>
    </nav>

</header>
<div class="cart-sidebar" id="cartSidebar">

    <div class="cart-header">

        <h2>Shopping Cart</h2>

        <i class="fa-solid fa-xmark" id="closeCart"></i>

    </div>

    <div class="cart-items" id="cartItems">

        <p class="empty-cart">
            Your cart is empty
        </p>

    </div>

    <div class="cart-footer">

        <h3>
            Total: $
            <span id="cartTotal">0</span>
        </h3>

        <button id="checkoutBtn">
    Checkout
</button>

    </div>

</div>
<div class="search-api">

    <input
    type="text"
    id="apiSearch"
    placeholder="Search Products">

</div>

<section class="products">

    <h2 class="section-title">
        All Products
    </h2>

    <!-- PRODUCTS WILL LOAD FROM FLASK API -->
<p id="productCount"></p>

<div class="product-container"
     id="productContainer">

</div>

</section>

<script src="cart.js"></script>
<script src="products-api.js"></script>
<div class="floating-nav">

    <button onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <button onclick="window.location.href='index.html'">
        <i class="fa-solid fa-house"></i>
    </button>

    <button onclick="window.scrollTo({
        top:0,
        behavior:'smooth'
    })">
        <i class="fa-solid fa-arrow-up"></i>
    </button>

</div>
</body>
</html>
