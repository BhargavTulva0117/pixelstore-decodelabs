<!DOCTYPE html>
<html lang="en">

<head>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Details</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>
    <div id="cartNotification" class="cart-notification">
    Product Added To Cart 🛒
</div>
<div class="cart-sidebar" id="cartSidebar">

    <div class="cart-header">

        <h2>Shopping Cart</h2>

        <i class="fa-solid fa-xmark" id="closeCart"></i>

    </div>

    <div id="cartItems">

        <p class="empty-cart">
            Your cart is empty
        </p>

    </div>

    <div class="cart-footer">

        <h3>Total: $ <span id="cartTotal">0</span></h3>

        <button class="checkout-btn">
            Checkout
        </button>

    </div>

</div>

<header>
        

<nav class="navbar">

<div class="logo">
PixelStore
</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>

<li><a href="products.html">Products</a></li>

</ul>

<div class="icons">

    <div class="cart-icon">

        <i class="fa-solid fa-cart-shopping"></i>

        <span id="cartCount">0</span>

    </div>

</div>

</nav>

</header>

<section class="product-details">

    <div class="details-image">

        <img id="productImage">

    </div>

    <div class="details-content">

        <h1 id="productName"></h1>

        <h2 id="productPrice"></h2>

        <p id="productDescription"></p>
        <div class="review-section">

    <h3>Reviews</h3>

    <div id="reviews"></div>

    <div class="review-box">

        <input
        id="reviewText"
        placeholder="Write your review...">

        <button id="addReview">
            Submit
        </button>

    </div>

</div>
        <ul id="productFeatures"></ul>

        <button class="hero-btn" id="detailsAddToCart">

            Add To Cart

        </button>

    </div>

</section>

<script src="cart.js"></script>
<script src="backend/product-details-api.js"></script>
<div class="floating-nav">

    <button onclick="history.back()">
        <i class="fa-solid fa-arrow-left"></i>
    </button>

    <button onclick="window.location.href='index.html'">
        <i class="fa-solid fa-house"></i>
    </button>

</div>
</body>

</html>
